<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<!-- 這裡放 Favicon 縮圖設定 -->
    <link rel="icon" href="favicon.ico?v2" type="image/x-icon">
    <!-- 如果使用 PNG 格式 -->
    <link rel="shortcut icon" href="favicon.png" type="image/png">
<title>大強來了計數器</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Arial","Microsoft JhengHei",sans-serif;
}

/*用戶自訂主題*/
:root{

    --bg:
        linear-gradient(
            180deg,
            #1d1b26,
            #111016
        );
    --card1:#2b2235;
    --card2:#18141f;

    --title:#ffd633;

    --counter1:#fff3c7;
    --counter2:#ffe28a;

    --btn1:#ffd93d;
    --btn2:#ffb700;

    --btn-text:#5c3200;
}


body{
    /*background:#1d1b26;*/
   background:var(--bg);

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    padding:20px;

    transition:.3s;
    overflow:hidden;/*手機滑動問題*/
    touch-action:manipulation;/*手機滑動問題*/
}
.app{
    width:380px;
    background:
        linear-gradient(
            180deg,
            var(--card1),
            var(--card2)
        );
    border-radius:35px;
    padding:25px;
    box-shadow:0 15px 50px rgba(0,0,0,.5);
    border:3px solid rgba(255,255,255,.05);
      position:relative;
}

.title{
    text-align:center;
    margin-bottom:25px;
}

.title h1{
    font-size:42px;
    color:#ffd633;
    text-shadow:
        0 4px 0 #9b6400,
        0 0 20px rgba(255,214,51,.5);
    font-weight:900;
}

.title p{
    color:#ff9ed0;
    font-size:20px;
    font-weight:bold;
    margin-top:5px;
}

.counter-box{
    background:linear-gradient(180deg,#fff3c7,#ffe28a);
    border-radius:30px;
    padding:30px 20px;
    text-align:center;
    border:5px solid #ffbf00;
    box-shadow:inset 0 4px 10px rgba(255,255,255,.5);
}

.counter-label{
    font-size:26px;
    color:#5e3d00;
    margin-bottom:15px;
    font-weight:bold;
}

.counter{
    font-weight:900;
    color:#5e2d00;

    width:100%;
    text-align:center;

    white-space:nowrap;

    transition:.15s;
}

.btn-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:25px;
}

button{
    border:none;
    border-radius:22px;
    padding:20px;
    font-size:32px;
    font-weight:900;
    cursor:pointer;
    transition:.15s;
    color:white;
}

button:active{
    transform:scale(.96);
}

.btn1{
    background:
        linear-gradient(
            180deg,
            var(--btn1),
            var(--btn2)
        );

    color:var(--btn-text);
}

.btn10{
    background:linear-gradient(180deg,#ff78b5,#ff4f95);
}

.btn100{
    background:linear-gradient(180deg,#9c7bff,#6f55ff);
}

.clear{
    width:100%;
    margin-top:15px;
    background:linear-gradient(180deg,#4fcbff,#268cff);
}
.danger{/*歸零案件危險色*/
    background:
        linear-gradient(
            180deg,
            #ff5f5f,
            #d90000
        );
}

.bottom{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
    opacity:.85;
    font-size:15px;
}

.switch{
    display:flex;
    align-items:center;
    gap:10px;
}

input[type=checkbox]{
    width:20px;
    height:20px;
}

.footer{
    text-align:center;
    color:#aaa;
    margin-top:18px;
    font-size:13px;
}

.duck{
    font-size:50px;
    text-align:center;
    margin-bottom:10px;
}
.btn-grid.simple{
    grid-template-columns:1fr;
}

.btn-grid.simple button{
    width:100%;
}
.duck{
    display:flex;
    justify-content:center;
    margin-bottom:10px;
}

.duck img{
    width:60px;
    height:auto;
    object-fit:contain;

    filter:
        drop-shadow(0 8px 12px rgba(0,0,0,.35));
}

#effect-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:9999;
}

.flying-duck{
    position:absolute;

    width:90px;
    height:90px;

    object-fit:contain;

    animation:floating 2.5s linear forwards;
}

@keyframes floating{

    0%{
        transform:
            translateY(0)
            rotate(0deg)
            scale(.6);

        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:
            translateY(-700px)
            rotate(360deg)
            scale(1.2);

        opacity:0;
    }

}

/*主題CSS*/
body[data-theme="pink"]{

    --bg:#2b1624;

    --card1:#44213a;
    --card2:#2a1524;

    --title:#ff8dc7;

    --counter1:#ffd6ea;
    --counter2:#ffb6d8;

    --btn1:#ff92c9;
    --btn2:#ff5ba6;

    --btn-text:white;
}

body[data-theme="dark"]{

    --bg:
        linear-gradient(
            180deg,
            #1f1b12,
            #0d0d0d
        );

    --card1:#232323;
    --card2:#151515;

    --title:#ffd700;

    --counter1:#2d2d2d;
    --counter2:#1a1a1a;

    --btn1:#444;
    --btn2:#222;

    --btn-text:#ffd700;
}

body[data-theme="purple"]{

     --bg:
        linear-gradient(
            180deg,
            #3a1c52,
            #1b1026
        );

    --card1:#43215e;
    --card2:#241232;

    --title:#cf9fff;

    --counter1:#ead8ff;
    --counter2:#caa8ff;

    --btn1:#bb86fc;
    --btn2:#8e5cff;
}
/*後續新增TOPbar*/
.top-bar{
    display:flex;
    justify-content:flex-end;
    margin-bottom:10px;
}

.menu-fab{

    position:absolute;

    top:18px;
    right:18px;

    width:48px;
    height:48px;

    border-radius:999px;

    border:none;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(12px);

    color:white;

    font-size:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:999;

    box-shadow:
        0 4px 20px rgba(0,0,0,.25);
}
.menu-fab{/*menu閒置時半透明*/
    opacity:.35;
    transition:.2s;
}

.menu-fab:hover,
.menu-fab:active{
    opacity:1;
}

.more-panel{

    margin-top:20px;

    background:#00000025;

    border-radius:24px;

    padding:18px;

    display:none;

    flex-direction:column;

    gap:16px;
}

.more-panel.show{
    display:flex;
}

.menu-hint{/*更多功能按鍵提示*/

    position:absolute;

    top:28px;
    right:74px;

    background:rgba(0,0,0,.45);

    color:white;

    padding:8px 14px;

    border-radius:999px;

    font-size:14px;

    white-space:nowrap;

    backdrop-filter:blur(10px);

    animation:hintFloat 2s ease-in-out infinite;
    /*opacity:.55;*/
}

@keyframes hintFloat{

    0%{
        transform:translateX(0);
    }

    50%{
        transform:translateX(-4px);
    }

    100%{
        transform:translateX(0);
    }
}
</style>
</head>

<body data-theme="yellow" >
<div class="top-bar">

    <button class="menu-fab" onclick="toggleMenu()">
    ⚙
</button>
<div class="menu-hint">
   ✨清零及特效功能設定➜
</div>
</div>

<div class="app">

    <div class="duck">
        <img src="favicon.png" alt="duck"> 
        <img src="favicon.png" alt="duck"> 
        <img src="favicon.png" alt="duck">
    </div>

    <div class="title">
        <h1>大強來了</h1>
        <p>嘎嘎數鴨計數器</p >
    </div>

    <div class="counter-box" onclick="add(1)">
        <div class="counter-label">目前累計數鴨</div>
        <div class="counter" id="counter">0</div>
    </div>

    <!--此處後插入TOPbar-->

   <div class="btn-grid simple">
    
    <button class="btn1" onclick="add(1)">🦆 +1</button>
</div>
<div class="more-panel" id="morePanel">
    <button class="clear" onclick="bulkAddDuck()"> 🦆一次加鴨</button>
    <button class="clear danger" onclick="resetCounter()">清零</button>


    <div class="bottom">
        <div class="switch">
            🔊 音效
            <input type="checkbox" id="soundToggle" >
        </div>
        <div class="switch">
            🎉 大強飄屏
            <input type="checkbox" id="effectToggle" checked>
        </div>
        
    </div>
    <div class="bottom">
        <div class="switch">
            🎨 主題

            <select id="themeSelect">
                <option value="dark" disabled>有任何問題都可以跟倒楣蛋小吳說</option>
                <option value="yellow" >經典黃</option>
                <option value="purple">紫紫桑</option>
                <option value="pink">粉紅嘎嘎</option>
                <option value="dark">深夜黑金</option>
                <option value="dark" disabled>倒楣蛋專用</option>
                
            </select>
        </div>
    </div>


    <div class="footer">
        <div>
            ✔ 開音效或開飄屏按太快會卡哦
        </div>
    </div>
    

    <div class="footer">
        *提醒:數鴨上限10萬，網頁關閉後紀錄還會在，電腦按一下+1後可以使用Enter連續點擊，謝謝強子謝謝紫紫桑。

    
    </div>

</div>

     <div class="footer">
       ✨來自地獄倒楣蛋小吳🀄 V1.868
    
    </div>

</div>
<div id="effect-layer"></div>
<script>
const counterEl = document.getElementById("counter");
const soundToggle = document.getElementById("soundToggle");

let count = localStorage.getItem("duckCount");

if(count === null){
    count = 0;
}else{
    count = parseInt(count);
}

updateDisplay();

function add(num){

    count += num;

    saveData();
    spawnDuck();

    if(soundToggle.checked){
        playSound();
    }

    updateDisplay();
    
    const panel =//auto收闔選單
        document.getElementById("morePanel");
    panel.classList.remove("show");
    document.body.style.overflow = "hidden";
}

function resetCounter(){
    if(confirm("確定要清零嗎？")){
        count = 0;
        saveData();
        updateDisplay();
    }
}

function updateDisplay(){
    counterEl.innerText = count.toLocaleString();
    const length = count.toString().length;
    if(length <= 3){
        counterEl.style.fontSize = "82px";
    }
    else if(length === 4){
        counterEl.style.fontSize = "72px";
    }
    else if(length === 5){
        counterEl.style.fontSize = "60px";
    }
    else if(length === 6){
        counterEl.style.fontSize = "50px";
    }
    else{
        counterEl.style.fontSize = "42px";
    }

}

function saveData(){
    localStorage.setItem("duckCount", count);
}

function playSound(){
    const audio = new Audio(
        "https://actions.google.com/sounds/v1/cartoon/pop.ogg"
    );

    audio.volume = 0.4;
    audio.play();
}

const effectToggle = document.getElementById("effectToggle");
const effectLayer = document.getElementById("effect-layer");

const duckImages = [

    "1.png",
    "2.png",
    "3.png",
    "4.png",
    "5.png",
    "6.png",
    "7.png",
    "8.png",
    "9.png",
    "10.png",

    "11.png",
    "12.png",
    "13.png",
    "14.png",
    "15.png",
    "16.png"/*,
    "17.png",
    "18.png",
    "19.png",
    "20.png"*/


];

function spawnDuck(){

    if(!effectToggle.checked){
        return;
    }

    const img = document.createElement("img");

    const randomImage =
        duckImages[
            Math.floor(Math.random() * duckImages.length)
        ];

    img.src = "pic/" +randomImage;

    img.className = "flying-duck";

    img.style.left =
        Math.random() * window.innerWidth + "px";

    img.style.bottom = "-100px";

    img.style.width =
        60 + Math.random() * 80 + "px";

    img.style.animationDuration =
        1.5 + Math.random() * 2 + "s";

    effectLayer.appendChild(img);

    setTimeout(() => {
        img.remove();
    }, 3000);
}
//主題調整
const themeSelect =
    document.getElementById("themeSelect");

const savedTheme =
    localStorage.getItem("duckTheme");

if(savedTheme){

    document.body.dataset.theme = savedTheme;

    themeSelect.value = savedTheme;
}

themeSelect.addEventListener("change", () => {

    const theme = themeSelect.value;

    document.body.dataset.theme = theme;

    localStorage.setItem(
        "duckTheme",
        theme
    );
});

function toggleMenu(){//顯示TOPbar

   const panel =
        document.getElementById("morePanel");

    panel.classList.toggle("show");

    if(panel.classList.contains("show")){

        document.body.style.overflow = "auto";
    }
    else{

        document.body.style.overflow = "hidden";
    }
}
function bulkAddDuck(){//一次加鴨功能

    const input =
        prompt("要一次增加幾隻鴨？");

    if(input === null){
        return;
    }

    const amount = parseInt(input);

    if(isNaN(amount)){
        alert("請輸入數字");
        return;
    }

    if(amount <= 0){
        alert("請輸入大於0的數字");
        return;
    }

    count += amount;

    saveData();

    updateDisplay();
}
</script>

</body>
</html>
